<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Start Quiz Page</title>

    <!-- Linking CSS File -->
    <link rel="stylesheet" href="StartQuizPage.css">

</head>

<body>

    <div id="StartQuizPageBody">

        <button id="StartQuizPageQuestionCountBtn">← Question Count</button>

        <h1 id="StartQuizPageHeading1">Quiz Ready</h1>

        <p id="StartQuizPageParagraph1">Your quiz configuration is complete. Review your selected settings below and start the challenge whenever you're ready.</p>

        <div id="StartQuizPageCardConatiner">

            <!-- All the pre-written content in these all items is just to see how CSS Would affect it , In Real it will be updated dynamically via JS -->

            <!-- CATEGORY -->
            <div class="StartQuizPageCardConatinerItems">

                <span class="StartQuizPageCardConatinerLogo">📚</span>

                <p class="StartQuizPageCardConatinerParagraph">CATEGORY</p>

                <h1 class="StartQuizPageCardConatinerHeading">General Knowledge</h1>

            </div>

            <!-- FORMAT -->
            <div class="StartQuizPageCardConatinerItems">

                <span class="StartQuizPageCardConatinerLogo">📝</span>

                <p class="StartQuizPageCardConatinerParagraph">FORMAT</p>

                <h1 class="StartQuizPageCardConatinerHeading">Multiple Choice</h1>

            </div>

            <!-- DIFFICULTY -->
            <div class="StartQuizPageCardConatinerItems">

                <span class="StartQuizPageCardConatinerLogo">⚡</span>

                <p class="StartQuizPageCardConatinerParagraph">DIFFICULTY</p>

                <h1 class="StartQuizPageCardConatinerHeading">Medium</h1>

            </div>

            <!-- QUESTION COUNT -->
            <div class="StartQuizPageCardConatinerItems">

                <span class="StartQuizPageCardConatinerLogo">🔢</span>

                <p class="StartQuizPageCardConatinerParagraph">QUESTION COUNT</p>

                <h1 class="StartQuizPageCardConatinerHeading">15<br>Questions</h1>

            </div>

        </div>

        <button id="StartQuizPageStartQuizBtn">Start Quiz</button>

    </div>
    
</body>

</html>
