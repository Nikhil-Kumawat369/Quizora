<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Count Selection Page</title>

    <!-- Linking CSS Files -->
    <link rel="stylesheet" href="QuizCountSelectionPage.css">

    <!-- Linking JS Files -->
    <script defer type="module" src="QuizCountSelectionPage.js"></script>

</head>

<body>

    <div id="QuizCountSelectionPageBody">

        <button id="QuizCountSelectionPageDifficultyBtn">← Difficulty</button>

        <h1 id="QuizCountSelectionPageHeading1">Choose Question</h1>
        <h1 id="QuizCountSelectionPageHeading2">Count</h1>

        <p id="QuizCountSelectionPageParagraph1">Select the style of questions you want before starting your quiz experience.</p>

        <div id="QuizCountSelectionPageQuizCountContainer">

            <!-- 5 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">5</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Quick Round</p>

            </div>

            <!-- 10 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">10</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Short Quiz</p>

            </div>

            <!-- 15 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">15</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Balanced</p>

            </div>

            <!-- 20 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">20</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Standard</p>

            </div>

            <!-- 25 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">25</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Long Session</p>

            </div>

            <!-- 30 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">30</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Challenge</p>

            </div>

            <!-- 35 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">35</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Hardcore</p>

            </div>

            <!-- 40 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">40</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Extreme</p>

            </div>

            <!-- 45 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">45</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Marathon</p>

            </div>

            <!-- 50 -->
            <div class="QuizCountSelectionPageQuizCountContainerItems">

                <span class="QuizCountSelectionPageQuizCountContainerLogo">50</span>

                <p class="QuizCountSelectionPageQuizCountContainerParagraph" style="font-size: 0.9em;">Ultimate</p>

            </div>

        </div>

        <button id="QuizCountSelectionPageContinueBtn">Continue</button>

    </div>
    
</body>

</html>
